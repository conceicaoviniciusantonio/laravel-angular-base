services:
  db:
    image: mysql:8.0
    container_name: laravel_angular_base_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel_angular_base
      MYSQL_USER: app_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_secret"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laravel_angular_base_backend
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel_angular_base
      DB_USERNAME: app_user
      DB_PASSWORD: secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: laravel_angular_base_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/var/www/frontend
    ports:
      - "4200:4200"
    networks:
      - app_net

volumes:
  db_data:

networks:
  app_net:
    driver: bridge
